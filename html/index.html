<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../icons/logo-cinetrack-192.png">
</head>
<body>

    <header>
        <h1>CineTrack</h1>
        <h2>Organize seus filmes e séries favoritas</h2>
    </header>

    <main>

        <div class="topo">
            <button id="adicionar">Adicionar</button>
            <input type="text" id="buscar" placeholder="Buscar filmes ou séries...">
        </div>

        <form id="formulario">

            <label for="titulo">Título</label>
            <input type="text" id="titulo" placeholder="Título do Filme ou Série" required>

            <label for="tipo">Tipo</label>
            <select id="tipo">
                <option>Filme</option>
                <option>Série</option>
            </select>

            <label for="status">Status</label>
            <select id="status">
                <option>Quero assistir</option>
                <option>Continuar assistindo</option>
                <option>Assistido</option>
            </select>

            <label for="imagem">Poster</label>
            <input type="url" id="imagem" placeholder="https://imagem.com/poster.jpg">

            <label>Avaliação</label>

            <div class="avaliacao">

                <input type="radio" id="estrela5" name="avaliacao" value="5">
                <label for="estrela5">★</label>

                <input type="radio" id="estrela4" name="avaliacao" value="4">
                <label for="estrela4">★</label>

                <input type="radio" id="estrela3" name="avaliacao" value="3">
                <label for="estrela3">★</label>

                <input type="radio" id="estrela2" name="avaliacao" value="2">
                <label for="estrela2">★</label>

                <input type="radio" id="estrela1" name="avaliacao" value="1">
                <label for="estrela1">★</label>

            </div>

            <div class="acoes-formulario">
                <button type="submit">Salvar</button>
                <button type="button" id="cancelarEdicao">Cancelar</button>
            </div>

        </form>

        <section id="cards"></section>

    </main>

    <script src="../javascript/script.js"></script>

</body>
</html>
